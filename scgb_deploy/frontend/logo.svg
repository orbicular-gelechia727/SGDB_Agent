<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- DNA double helix abstraction with data nodes -->
  <!-- Left strand -->
  <path d="M8 4C8 4 14 10 14 16C14 22 8 28 8 28" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Right strand -->
  <path d="M24 4C24 4 18 10 18 16C18 22 24 28 24 28" stroke="#1e6bb8" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Cross bridges (base pairs) -->
  <line x1="10" y1="8" x2="22" y2="8" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="13" x2="19" y2="13" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="19" x2="19" y2="19" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="24" x2="22" y2="24" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Data nodes -->
  <circle cx="10" cy="8" r="2" fill="#38bdf8"/>
  <circle cx="22" cy="8" r="2" fill="#1e6bb8"/>
  <circle cx="13" cy="13" r="1.5" fill="#38bdf8"/>
  <circle cx="19" cy="13" r="1.5" fill="#1e6bb8"/>
  <circle cx="13" cy="19" r="1.5" fill="#1e6bb8"/>
  <circle cx="19" cy="19" r="1.5" fill="#38bdf8"/>
  <circle cx="10" cy="24" r="2" fill="#1e6bb8"/>
  <circle cx="22" cy="24" r="2" fill="#38bdf8"/>
</svg>
