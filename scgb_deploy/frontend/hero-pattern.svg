<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" fill="none">
  <!-- Abstract cell/data network pattern for hero background -->
  <!-- Scattered circles (cells) -->
  <circle cx="80" cy="60" r="3" fill="#38bdf8" opacity="0.15"/>
  <circle cx="200" cy="120" r="5" fill="#38bdf8" opacity="0.12"/>
  <circle cx="350" cy="40" r="4" fill="#1e6bb8" opacity="0.18"/>
  <circle cx="500" cy="90" r="3" fill="#38bdf8" opacity="0.1"/>
  <circle cx="650" cy="50" r="6" fill="#1e6bb8" opacity="0.14"/>
  <circle cx="720" cy="140" r="4" fill="#38bdf8" opacity="0.12"/>
  <circle cx="120" cy="200" r="4" fill="#1e6bb8" opacity="0.1"/>
  <circle cx="300" cy="250" r="5" fill="#38bdf8" opacity="0.15"/>
  <circle cx="450" cy="180" r="3" fill="#1e6bb8" opacity="0.12"/>
  <circle cx="600" cy="220" r="4" fill="#38bdf8" opacity="0.1"/>
  <circle cx="750" cy="280" r="5" fill="#1e6bb8" opacity="0.14"/>
  <circle cx="50" cy="320" r="3" fill="#38bdf8" opacity="0.12"/>
  <circle cx="180" cy="350" r="4" fill="#1e6bb8" opacity="0.1"/>
  <circle cx="400" cy="340" r="6" fill="#38bdf8" opacity="0.15"/>
  <circle cx="550" cy="360" r="3" fill="#1e6bb8" opacity="0.12"/>
  <circle cx="700" cy="380" r="4" fill="#38bdf8" opacity="0.1"/>
  <!-- Connection lines -->
  <line x1="80" y1="60" x2="200" y2="120" stroke="#38bdf8" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="120" x2="350" y2="40" stroke="#1e6bb8" stroke-width="0.5" opacity="0.06"/>
  <line x1="350" y1="40" x2="500" y2="90" stroke="#38bdf8" stroke-width="0.5" opacity="0.08"/>
  <line x1="500" y1="90" x2="650" y2="50" stroke="#1e6bb8" stroke-width="0.5" opacity="0.06"/>
  <line x1="120" y1="200" x2="300" y2="250" stroke="#38bdf8" stroke-width="0.5" opacity="0.08"/>
  <line x1="300" y1="250" x2="450" y2="180" stroke="#1e6bb8" stroke-width="0.5" opacity="0.06"/>
  <line x1="450" y1="180" x2="600" y2="220" stroke="#38bdf8" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="220" x2="750" y2="280" stroke="#1e6bb8" stroke-width="0.5" opacity="0.06"/>
  <line x1="200" y1="120" x2="120" y2="200" stroke="#38bdf8" stroke-width="0.5" opacity="0.05"/>
  <line x1="500" y1="90" x2="450" y2="180" stroke="#1e6bb8" stroke-width="0.5" opacity="0.05"/>
  <line x1="650" y1="50" x2="720" y2="140" stroke="#38bdf8" stroke-width="0.5" opacity="0.05"/>
  <!-- Larger glow circles -->
  <circle cx="200" cy="120" r="20" fill="#38bdf8" opacity="0.03"/>
  <circle cx="500" cy="90" r="25" fill="#1e6bb8" opacity="0.03"/>
  <circle cx="300" cy="250" r="18" fill="#38bdf8" opacity="0.03"/>
  <circle cx="650" cy="50" r="22" fill="#1e6bb8" opacity="0.03"/>
</svg>
