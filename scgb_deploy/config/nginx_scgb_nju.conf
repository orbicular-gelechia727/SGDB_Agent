# Nginx 配置文件 - 南京大学配置版本
# 复制到 /etc/nginx/sites-available/scgb-portal

server {
    listen 80;
    server_name biobigdata.nju.edu.cn;
    
    # 日志配置
    access_log /var/log/nginx/scgb-access.log;
    error_log /var/log/nginx/scgb-error.log;

    # ===========================================
    # 1. 前端静态文件 - 子路径 /singledb/
    # ===========================================
    location /singledb/ {
        alias /opt/scgb-portal/frontend/;  # 注意: 尾部斜杠很重要
        index index.html;
        try_files $uri $uri/ /singledb/index.html;
    }

    # ===========================================
    # 2. API 请求转发给 FastAPI - 统一使用 /scdbAPI/
    # ===========================================
    location /scdbAPI/ {
        proxy_pass http://127.0.0.1:13009;  # 后端运行在 13009 端口
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===========================================
    # 3. WebSocket 支持（聊天功能）
    # ===========================================
    location /scdbAPI/query/stream {
        proxy_pass http://127.0.0.1:13009;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ===========================================
    # 4. 可选: 根路径重定向到子路径
    # ===========================================
    location = / {
        return 301 /singledb/;
    }
}

